<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品发布 - 电商后台</title>
    <link rel="stylesheet" href="https://unpkg.com/@eficy/shadcn-ui@1.1.0/dist/index.css" />
  </head>
  <body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script type="importmap">
      { "imports": { "shadcn": "https://unpkg.com/@eficy/shadcn-ui@1.1.0/dist/index.js" } }
    </script>
    <script type="module" src="https://unpkg.com/@eficy/browser@1.2.0/dist/standalone.mjs"></script>

    <script type="text/eficy">
      import { initEficy, render, signal, computed, component, bind, batch } from 'eficy';
      import * as shadcnUi from 'shadcn';

      // 1. 初始化
      const {
        Button, Input, Label, Textarea, Select, SelectContent, SelectItem, SelectTrigger, SelectValue,
        Card, CardContent, CardHeader, CardTitle, CardDescription,
        Tabs, TabsContent, TabsList, TabsTrigger,
        Badge, Separator, ScrollArea, Dialog, DialogContent, DialogHeader, DialogTitle, DialogTrigger,
        Table, TableBody, TableCell, TableHead, TableHeader, TableRow,
        Checkbox
      } = shadcnUi;
      const { Plus, Trash2, Upload, ChevronDown, Save, Eye, Package } = shadcnUi.Lucide;

      await initEficy();

      // 2. 状态定义 - 复杂表单状态
      // 基本信息
      const productName = signal('');
      const productCode = signal('');
      const category = signal('');
      const brand = signal('');
      const description = signal('');

      // 价格库存
      const price = signal('');
      const originalPrice = signal('');
      const costPrice = signal('');
      const stock = signal('');
      const minPurchase = signal('1');
      const maxPurchase = signal('');

      // 规格属性
      const specs = signal([
        { name: '颜色', values: ['红色', '蓝色', '黑色'] },
        { name: '尺寸', values: ['S', 'M', 'L', 'XL'] }
      ]);
      const selectedSpecs = signal([]);

      // SKU 列表（根据规格组合生成）
      const skuList = signal([]);

      // 物流信息
      const weight = signal('');
      const length = signal('');
      const width = signal('');
      const height = signal('');
      const shippingTemplate = signal('');

      // 图文信息
      const mainImages = signal([]);
      const detailImages = signal([]);

      // 其他设置
      const isOnSale = signal(true);
      const isRecommend = signal(false);
      const isNew = signal(true);
      const tags = signal([]);
      const newTag = signal('');

      // 表单状态
      const activeTab = signal('basic');
      const isSubmitting = signal(false);
      const showPreview = signal(false);
      const errors = signal({});

      // 3. 计算属性
      const priceNum = computed(() => Number(price.value) || 0);
      const originalPriceNum = computed(() => Number(originalPrice.value) || 0);
      const profit = computed(() => priceNum.value - (Number(costPrice.value) || 0));
      const profitRate = computed(() => {
        if (priceNum.value === 0) return 0;
        return ((profit.value / priceNum.value) * 100).toFixed(2);
      });

      const discount = computed(() => {
        if (originalPriceNum.value === 0) return 10;
        return ((priceNum.value / originalPriceNum.value) * 10).toFixed(1);
      });

      const isFormValid = computed(() => {
        return productName.value.trim() &&
               category.value &&
               price.value &&
               Number(price.value) > 0 &&
               stock.value &&
               Number(stock.value) >= 0;
      });

      const skuCount = computed(() => skuList.value.length);
      const totalStock = computed(() => {
        return skuList.value.reduce((sum, sku) => sum + (Number(sku.stock) || 0), 0);
      });

      // 4. 辅助函数
      const generateSKUs = () => {
        const specs_val = specs.value;
        if (specs_val.length === 0) {
          skuList.value = [];
          return;
        }

        // 生成规格组合
        const combinations = specs_val.reduce((acc, spec) => {
          if (acc.length === 0) {
            return spec.values.map(v => ({ [spec.name]: v }));
          }
          const newAcc = [];
          acc.forEach(item => {
            spec.values.forEach(v => {
              newAcc.push({ ...item, [spec.name]: v });
            });
          });
          return newAcc;
        }, []);

        // 生成 SKU 列表
        skuList.value = combinations.map((combo, index) => ({
          id: `SKU${Date.now()}${index}`,
          specs: combo,
          price: price.value,
          stock: '0',
          code: `${productCode.value || 'P'}${index + 1}`
        }));
      };

      const addSpec = () => {
        specs.value = [...specs.value, { name: '', values: [] }];
      };

      const removeSpec = (index) => {
        const newSpecs = [...specs.value];
        newSpecs.splice(index, 1);
        specs.value = newSpecs;
        generateSKUs();
      };

      const updateSpecName = (index, name) => {
        const newSpecs = [...specs.value];
        newSpecs[index] = { ...newSpecs[index], name };
        specs.value = newSpecs;
        generateSKUs();
      };

      const addSpecValue = (specIndex, value) => {
        if (!value.trim()) return;
        const newSpecs = [...specs.value];
        newSpecs[specIndex] = {
          ...newSpecs[specIndex],
          values: [...newSpecs[specIndex].values, value.trim()]
        };
        specs.value = newSpecs;
        generateSKUs();
      };

      const removeSpecValue = (specIndex, valueIndex) => {
        const newSpecs = [...specs.value];
        newSpecs[specIndex] = {
          ...newSpecs[specIndex],
          values: newSpecs[specIndex].values.filter((_, i) => i !== valueIndex)
        };
        specs.value = newSpecs;
        generateSKUs();
      };

      const updateSKU = (index, field, value) => {
        const newList = [...skuList.value];
        newList[index] = { ...newList[index], [field]: value };
        skuList.value = newList;
      };

      const addTag = () => {
        if (!newTag.value.trim()) return;
        if (!tags.value.includes(newTag.value.trim())) {
          tags.value = [...tags.value, newTag.value.trim()];
        }
        newTag.value = '';
      };

      const removeTag = (tag) => {
        tags.value = tags.value.filter(t => t !== tag);
      };

      const handleSubmit = async () => {
        if (!isFormValid.value) {
          errors.value = { submit: '请填写必填项' };
          return;
        }

        isSubmitting.value = true;

        // 模拟提交
        await new Promise(resolve => setTimeout(resolve, 1500));

        alert('商品发布成功！');
        isSubmitting.value = false;
      };

      const handleSaveDraft = () => {
        alert('草稿已保存');
      };

      // 初始化时生成 SKU
      generateSKUs();

      // 5. 组件定义
      const ProductForm = component(() => {
        return (
          <div className="min-h-screen bg-gray-50 p-6">
            <div className="max-w-6xl mx-auto">
              {/* 页面标题 */}
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                  <Package className="w-8 h-8 text-primary" />
                  <div>
                    <h1 className="text-2xl font-bold">发布新商品</h1>
                    <p className="text-sm text-muted-foreground">填写商品信息，完成商品发布</p>
                  </div>
                </div>
                <div className="flex gap-3">
                  <Button variant="outline" onClick={handleSaveDraft}>
                    <Save className="w-4 h-4 mr-2" />
                    保存草稿
                  </Button>
                  <Button variant="outline" onClick={() => showPreview.value = true}>
                    <Eye className="w-4 h-4 mr-2" />
                    预览
                  </Button>
                  <Button
                    disabled={computed(() => !isFormValid.value || isSubmitting.value)}
                    onClick={handleSubmit}
                  >
                    {isSubmitting.value ? '发布中...' : '立即发布'}
                  </Button>
                </div>
              </div>

              {/* 错误提示 */}
              {computed(() => errors.value.submit && (
                <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
                  {errors.value.submit}
                </div>
              ))}

              <Tabs value={activeTab.value} onValueChange={(v) => { activeTab.value = v; }}>
                <TabsList className="mb-6">
                  <TabsTrigger value="basic">基本信息</TabsTrigger>
                  <TabsTrigger value="price">价格库存</TabsTrigger>
                  <TabsTrigger value="specs">规格属性</TabsTrigger>
                  <TabsTrigger value="logistics">物流信息</TabsTrigger>
                  <TabsTrigger value="images">图文详情</TabsTrigger>
                  <TabsTrigger value="settings">其他设置</TabsTrigger>
                </TabsList>

                {/* 基本信息 */}
                <TabsContent value="basic">
                  <Card>
                    <CardHeader>
                      <CardTitle>基本信息</CardTitle>
                      <CardDescription>填写商品的基本信息</CardDescription>
                    </CardHeader>
                    <CardContent className="space-y-6">
                      <div className="grid grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <Label>商品名称 <span className="text-red-500">*</span></Label>
                          <Input {...bind(productName)} placeholder="请输入商品名称" />
                        </div>
                        <div className="space-y-2">
                          <Label>商品编码</Label>
                          <Input {...bind(productCode)} placeholder="如：SP20240001" />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <Label>商品分类 <span className="text-red-500">*</span></Label>
                          <Select value={category.value} onValueChange={(v) => category.value = v}>
                            <SelectTrigger>
                              <SelectValue placeholder="选择分类" />
                            </SelectTrigger>
                            <SelectContent>
                              <SelectItem value="clothing">服装鞋帽</SelectItem>
                              <SelectItem value="electronics">数码电器</SelectItem>
                              <SelectItem value="food">食品生鲜</SelectItem>
                              <SelectItem value="beauty">美妆个护</SelectItem>
                              <SelectItem value="home">家居日用</SelectItem>
                            </SelectContent>
                          </Select>
                        </div>
                        <div className="space-y-2">
                          <Label>品牌</Label>
                          <Input {...bind(brand)} placeholder="品牌名称" />
                        </div>
                      </div>

                      <div className="space-y-2">
                        <Label>商品描述</Label>
                        <Textarea
                          {...bind(description)}
                          placeholder="请输入商品描述"
                          rows={4}
                        />
                      </div>
                    </CardContent>
                  </Card>
                </TabsContent>

                {/* 价格库存 */}
                <TabsContent value="price">
                  <Card>
                    <CardHeader>
                      <CardTitle>价格库存</CardTitle>
                      <CardDescription>设置商品价格与库存信息</CardDescription>
                    </CardHeader>
                    <CardContent className="space-y-6">
                      <div className="grid grid-cols-3 gap-6">
                        <div className="space-y-2">
                          <Label>销售价 <span className="text-red-500">*</span></Label>
                          <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">¥</span>
                            <Input
                              {...bind(price)}
                              type="number"
                              placeholder="0.00"
                              className="pl-7"
                            />
                          </div>
                        </div>
                        <div className="space-y-2">
                          <Label>原价</Label>
                          <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">¥</span>
                            <Input
                              {...bind(originalPrice)}
                              type="number"
                              placeholder="0.00"
                              className="pl-7"
                            />
                          </div>
                        </div>
                        <div className="space-y-2">
                          <Label>成本价</Label>
                          <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">¥</span>
                            <Input
                              {...bind(costPrice)}
                              type="number"
                              placeholder="0.00"
                              className="pl-7"
                            />
                          </div>
                        </div>
                      </div>

                      {/* 利润分析 */}
                      {computed(() => price.value && costPrice.value && (
                        <div className="bg-blue-50 p-4 rounded-lg">
                          <div className="flex items-center gap-6 text-sm">
                            <span>利润: <strong className="text-blue-600">¥{profit.value.toFixed(2)}</strong></span>
                            <span>利润率: <strong className="text-blue-600">{profitRate.value}%</strong></span>
                            {originalPrice.value && (
                              <span>折扣: <strong className="text-blue-600">{discount.value}折</strong></span>
                            )}
                          </div>
                        </div>
                      ))}

                      <div className="grid grid-cols-3 gap-6">
                        <div className="space-y-2">
                          <Label>库存数量 <span className="text-red-500">*</span></Label>
                          <Input {...bind(stock)} type="number" placeholder="0" />
                        </div>
                        <div className="space-y-2">
                          <Label>最小购买量</Label>
                          <Input {...bind(minPurchase)} type="number" placeholder="1" />
                        </div>
                        <div className="space-y-2">
                          <Label>最大购买量</Label>
                          <Input {...bind(maxPurchase)} type="number" placeholder="不限" />
                        </div>
                      </div>
                    </CardContent>
                  </Card>
                </TabsContent>

                {/* 规格属性 */}
                <TabsContent value="specs">
                  <Card>
                    <CardHeader>
                      <CardTitle>规格属性</CardTitle>
                      <CardDescription>设置商品规格，自动生成 SKU</CardDescription>
                    </CardHeader>
                    <CardContent className="space-y-6">
                      {/* 规格列表 */}
                      <div className="space-y-4">
                        {computed(() => specs.value.map((spec, specIndex) => (
                          <div key={specIndex} className="border rounded-lg p-4">
                            <div className="flex items-center gap-4 mb-3">
                              <Input
                                value={spec.name}
                                onChange={(e) => updateSpecName(specIndex, e.target.value)}
                                placeholder="规格名称（如：颜色）"
                                className="w-48"
                              />
                              <Button
                                variant="ghost"
                                size="sm"
                                onClick={() => removeSpec(specIndex)}
                              >
                                <Trash2 className="w-4 h-4 text-red-500" />
                              </Button>
                            </div>
                            <div className="flex flex-wrap gap-2">
                              {spec.values.map((value, valueIndex) => (
                                <Badge key={valueIndex} variant="secondary" className="px-3 py-1">
                                  {value}
                                  <button
                                    className="ml-2 text-gray-500 hover:text-red-500"
                                    onClick={() => removeSpecValue(specIndex, valueIndex)}
                                  >
                                    ×
                                  </button>
                                </Badge>
                              ))}
                              <Input
                                placeholder="添加规格值"
                                className="w-32 h-8"
                                onKeyPress={(e) => {
                                  if (e.key === 'Enter') {
                                    addSpecValue(specIndex, e.target.value);
                                    e.target.value = '';
                                  }
                                }}
                              />
                            </div>
                          </div>
                        )))}
                      </div>

                      <Button variant="outline" onClick={addSpec}>
                        <Plus className="w-4 h-4 mr-2" />
                        添加规格
                      </Button>

                      {/* SKU 列表 */}
                      {computed(() => skuList.value.length > 0 && (
                        <div className="mt-6">
                          <div className="flex items-center justify-between mb-4">
                            <h3 className="font-semibold">SKU 列表 ({skuCount.value} 个 SKU)</h3>
                            <span className="text-sm text-muted-foreground">
                              总库存: {totalStock.value}
                            </span>
                          </div>
                          <Table>
                            <TableHeader>
                              <TableRow>
                                <TableHead>规格组合</TableHead>
                                <TableHead>SKU 编码</TableHead>
                                <TableHead>价格</TableHead>
                                <TableHead>库存</TableHead>
                              </TableRow>
                            </TableHeader>
                            <TableBody>
                              {skuList.value.map((sku, index) => (
                                <TableRow key={sku.id}>
                                  <TableCell>
                                    {Object.entries(sku.specs).map(([k, v]) => `${k}:${v}`).join(', ')}
                                  </TableCell>
                                  <TableCell>
                                    <Input
                                      value={sku.code}
                                      onChange={(e) => updateSKU(index, 'code', e.target.value)}
                                      className="w-32"
                                    />
                                  </TableCell>
                                  <TableCell>
                                    <Input
                                      value={sku.price}
                                      onChange={(e) => updateSKU(index, 'price', e.target.value)}
                                      className="w-24"
                                    />
                                  </TableCell>
                                  <TableCell>
                                    <Input
                                      value={sku.stock}
                                      onChange={(e) => updateSKU(index, 'stock', e.target.value)}
                                      className="w-24"
                                    />
                                  </TableCell>
                                </TableRow>
                              ))}
                            </TableBody>
                          </Table>
                        </div>
                      ))}
                    </CardContent>
                  </Card>
                </TabsContent>

                {/* 物流信息 */}
                <TabsContent value="logistics">
                  <Card>
                    <CardHeader>
                      <CardTitle>物流信息</CardTitle>
                      <CardDescription>设置商品物流相关信息</CardDescription>
                    </CardHeader>
                    <CardContent className="space-y-6">
                      <div className="grid grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <Label>商品重量 (kg)</Label>
                          <Input {...bind(weight)} type="number" placeholder="0.00" />
                        </div>
                        <div className="space-y-2">
                          <Label>运费模板</Label>
                          <Select value={shippingTemplate.value} onValueChange={(v) => shippingTemplate.value = v}>
                            <SelectTrigger>
                              <SelectValue placeholder="选择运费模板" />
                            </SelectTrigger>
                            <SelectContent>
                              <SelectItem value="free">包邮</SelectItem>
                              <SelectItem value="template1">按重量计费</SelectItem>
                              <SelectItem value="template2">按件数计费</SelectItem>
                            </SelectContent>
                          </Select>
                        </div>
                      </div>

                      <div className="space-y-2">
                        <Label>商品尺寸 (cm)</Label>
                        <div className="grid grid-cols-3 gap-4">
                          <Input {...bind(length)} type="number" placeholder="长" />
                          <Input {...bind(width)} type="number" placeholder="宽" />
                          <Input {...bind(height)} type="number" placeholder="高" />
                        </div>
                      </div>
                    </CardContent>
                  </Card>
                </TabsContent>

                {/* 图文详情 */}
                <TabsContent value="images">
                  <Card>
                    <CardHeader>
                      <CardTitle>图文详情</CardTitle>
                      <CardDescription>上传商品图片和详情描述</CardDescription>
                    </CardHeader>
                    <CardContent className="space-y-6">
                      <div className="space-y-2">
                        <Label>主图 <span className="text-red-500">*</span> (建议尺寸 800x800)</Label>
                        <div className="border-2 border-dashed rounded-lg p-8 text-center hover:bg-gray-50 cursor-pointer">
                          <Upload className="w-8 h-8 mx-auto mb-2 text-gray-400" />
                          <p className="text-sm text-gray-500">点击上传或拖拽图片到此处</p>
                          <p className="text-xs text-gray-400 mt-1">支持 JPG、PNG 格式，最多 5 张</p>
                        </div>
                      </div>

                      <div className="space-y-2">
                        <Label>详情描述</Label>
                        <Textarea
                          {...bind(description)}
                          placeholder="请输入商品详情描述，支持图文混排"
                          rows={8}
                        />
                      </div>
                    </CardContent>
                  </Card>
                </TabsContent>

                {/* 其他设置 */}
                <TabsContent value="settings">
                  <Card>
                    <CardHeader>
                      <CardTitle>其他设置</CardTitle>
                      <CardDescription>设置商品标签和状态</CardDescription>
                    </CardHeader>
                    <CardContent className="space-y-6">
                      <div className="flex items-center gap-6">
                        <div className="flex items-center space-x-2">
                          <Checkbox
                            checked={isOnSale.value}
                            onCheckedChange={(v) => isOnSale.value = v}
                          />
                          <Label>立即上架</Label>
                        </div>
                        <div className="flex items-center space-x-2">
                          <Checkbox
                            checked={isRecommend.value}
                            onCheckedChange={(v) => isRecommend.value = v}
                          />
                          <Label>推荐商品</Label>
                        </div>
                        <div className="flex items-center space-x-2">
                          <Checkbox
                            checked={isNew.value}
                            onCheckedChange={(v) => isNew.value = v}
                          />
                          <Label>新品</Label>
                        </div>
                      </div>

                      <Separator />

                      <div className="space-y-2">
                        <Label>商品标签</Label>
                        <div className="flex gap-2">
                          <Input
                            {...bind(newTag)}
                            placeholder="添加标签"
                            onKeyPress={(e) => e.key === 'Enter' && addTag()}
                          />
                          <Button onClick={addTag}>添加</Button>
                        </div>
                        <div className="flex flex-wrap gap-2 mt-2">
                          {computed(() => tags.value.map((tag, index) => (
                            <Badge key={index} variant="outline" className="px-3 py-1">
                              {tag}
                              <button
                                className="ml-2 text-gray-500 hover:text-red-500"
                                onClick={() => removeTag(tag)}
                              >
                                ×
                              </button>
                            </Badge>
                          )))}
                        </div>
                      </div>
                    </CardContent>
                  </Card>
                </TabsContent>
              </Tabs>
            </div>
          </div>
        );
      });

      render(ProductForm, document.getElementById('app'));
    </script>
  </body>
</html>
