<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户管理后台 - Eficy Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/@eficy/shadcn-ui@1.1.0-beta.2/dist/index.css" />
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script type="importmap">
    { "imports": { "shadcn": "https://unpkg.com/@eficy/shadcn-ui@1.1.0-beta.2/dist/index.js" } }
  </script>
  <script type="module" src="https://unpkg.com/@eficy/browser@1.2.0-beta.7/dist/standalone.mjs"></script>

  <script type="text/eficy">
    import { initEficy, render, signal, computed, effect, observer, component, bind, peek, batch } from 'eficy';
    import * as shadcnUi from 'shadcn';

    // 1. 初始化
    const { 
      Button, Input, Card, CardContent, CardHeader, CardTitle, CardDescription,
      Table, TableBody, TableCell, TableHead, TableHeader, TableRow,
      Dialog, DialogContent, DialogDescription, DialogFooter, DialogHeader, DialogTitle, DialogTrigger,
      Select, SelectContent, SelectItem, SelectTrigger, SelectValue,
      Badge, Switch, Label,
      AlertDialog, AlertDialogAction, AlertDialogCancel, AlertDialogContent, 
      AlertDialogDescription, AlertDialogFooter, AlertDialogHeader, AlertDialogTitle, AlertDialogTrigger
    } = shadcnUi;
    const { Plus, Search, Trash2, UserPlus, Users } = shadcnUi.Lucide;

    await initEficy();

    // 2. 状态定义
    // 用户列表数据
    const users = signal([
      { id: 1, username: '张三', email: 'zhangsan@example.com', status: true, role: 'admin', createdAt: '2024-01-15' },
      { id: 2, username: '李四', email: 'lisi@example.com', status: true, role: 'user', createdAt: '2024-02-20' },
      { id: 3, username: '王五', email: 'wangwu@example.com', status: false, role: 'user', createdAt: '2024-03-10' },
      { id: 4, username: '赵六', email: 'zhaoliu@example.com', status: true, role: 'editor', createdAt: '2024-04-05' },
    ]);

    // 搜索关键词
    const searchKeyword = signal('');

    // 对话框状态
    const dialogOpen = signal(false);

    // 新用户表单状态（原子化 Signal）
    const newUsername = signal('');
    const newEmail = signal('');
    const newRole = signal('user');

    // ID 计数器
    const nextId = signal(5);

    // 3. 衍生状态 - 过滤后的用户列表
    const filteredUsers = computed(() => {
      const keyword = searchKeyword.value.toLowerCase();
      if (!keyword) return users.value;
      return users.value.filter(user => 
        user.username.toLowerCase().includes(keyword)
      );
    });

    // 4. 用户统计
    const userStats = computed(() => {
      const total = users.value.length;
      const active = users.value.filter(u => u.status).length;
      const inactive = total - active;
      return { total, active, inactive };
    });

    // 5. 操作函数
    // 添加用户
    const handleAddUser = () => {
      if (!newUsername.value || !newEmail.value) return;
      
      const newUser = {
        id: nextId.value,
        username: newUsername.value,
        email: newEmail.value,
        status: true,
        role: newRole.value,
        createdAt: new Date().toISOString().split('T')[0]
      };
      
      batch(() => {
        users.value = [...users.value, newUser];
        nextId.value = nextId.value + 1;
        // 重置表单
        newUsername.value = '';
        newEmail.value = '';
        newRole.value = 'user';
        dialogOpen.value = false;
      });
    };

    // 删除用户
    const handleDeleteUser = (id) => {
      users.value = users.value.filter(user => user.id !== id);
    };

    // 切换用户状态
    const handleToggleStatus = (id) => {
      users.value = users.value.map(user => 
        user.id === id ? { ...user, status: !user.status } : user
      );
    };

    // 获取角色显示名称
    const getRoleLabel = (role) => {
      const roleMap = { admin: '管理员', editor: '编辑', user: '用户' };
      return roleMap[role] || role;
    };

    // 获取角色徽章样式
    const getRoleVariant = (role) => {
      const variantMap = { admin: 'destructive', editor: 'secondary', user: 'outline' };
      return variantMap[role] || 'outline';
    };

    // 6. 组件定义
    // 统计卡片组件
    const StatCard = component(({ title, value, description, variant }) => {
      return (
        <Card>
          <CardHeader className="pb-2">
            <CardDescription>{title}</CardDescription>
            <CardTitle className="text-3xl">{value}</CardTitle>
          </CardHeader>
          <CardContent>
            <p className="text-xs text-muted-foreground">{description}</p>
          </CardContent>
        </Card>
      );
    });

    // 用户行组件
    const UserRow = component(({ user }) => {
      return (
        <TableRow>
          <TableCell className="font-medium">{user.username}</TableCell>
          <TableCell>{user.email}</TableCell>
          <TableCell>
            <Badge variant={getRoleVariant(user.role)}>
              {getRoleLabel(user.role)}
            </Badge>
          </TableCell>
          <TableCell>
            <div className="flex items-center gap-2">
              <Switch 
                checked={user.status}
                onCheckedChange={() => handleToggleStatus(user.id)}
              />
              <span className={user.status ? 'text-green-600' : 'text-gray-400'}>
                {user.status ? '启用' : '禁用'}
              </span>
            </div>
          </TableCell>
          <TableCell>{user.createdAt}</TableCell>
          <TableCell>
            <AlertDialog>
              <AlertDialogTrigger asChild>
                <Button variant="ghost" size="icon" className="text-red-500 hover:text-red-700">
                  {Trash2 && <Trash2 className="h-4 w-4" />}
                </Button>
              </AlertDialogTrigger>
              <AlertDialogContent>
                <AlertDialogHeader>
                  <AlertDialogTitle>确认删除</AlertDialogTitle>
                  <AlertDialogDescription>
                    确定要删除用户 "{user.username}" 吗？此操作无法撤销。
                  </AlertDialogDescription>
                </AlertDialogHeader>
                <AlertDialogFooter>
                  <AlertDialogCancel>取消</AlertDialogCancel>
                  <AlertDialogAction onClick={() => handleDeleteUser(user.id)}>
                    删除
                  </AlertDialogAction>
                </AlertDialogFooter>
              </AlertDialogContent>
            </AlertDialog>
          </TableCell>
        </TableRow>
      );
    });

    // 主应用组件
    const App = component(() => {
      return (
        <div className="min-h-screen bg-gray-50 p-8">
          <div className="max-w-6xl mx-auto space-y-6">
            {/* 页面标题 */}
            <div className="flex items-center gap-3">
              {Users && <Users className="h-8 w-8 text-primary" />}
              <div>
                <h1 className="text-3xl font-bold">用户管理</h1>
                <p className="text-muted-foreground">管理系统用户账户和权限</p>
              </div>
            </div>

            {/* 统计卡片 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <StatCard 
                title="总用户数" 
                value={userStats.value.total}
                description="系统注册用户总数"
              />
              <StatCard 
                title="活跃用户" 
                value={userStats.value.active}
                description="当前启用状态的用户"
              />
              <StatCard 
                title="已禁用" 
                value={userStats.value.inactive}
                description="当前禁用状态的用户"
              />
            </div>

            {/* 主内容卡片 */}
            <Card>
              <CardHeader>
                <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                  <div>
                    <CardTitle>用户列表</CardTitle>
                    <CardDescription>查看和管理所有用户</CardDescription>
                  </div>
                  
                  <div className="flex items-center gap-3">
                    {/* 搜索框 */}
                    <div className="relative">
                      {Search && <Search className="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground" />}
                      <Input 
                        placeholder="搜索用户名..." 
                        className="pl-9 w-64"
                        {...bind(searchKeyword)}
                      />
                    </div>
                    
                    {/* 添加用户按钮 */}
                    <Dialog open={dialogOpen} onOpenChange={(open) => { dialogOpen.value = open; }}>
                      <DialogTrigger asChild>
                        <Button>
                          {UserPlus && <UserPlus className="h-4 w-4 mr-2" />}
                          添加用户
                        </Button>
                      </DialogTrigger>
                      <DialogContent>
                        <DialogHeader>
                          <DialogTitle>添加新用户</DialogTitle>
                          <DialogDescription>
                            填写以下信息创建新用户账户
                          </DialogDescription>
                        </DialogHeader>
                        
                        <div className="space-y-4 py-4">
                          <div className="space-y-2">
                            <Label htmlFor="username">用户名</Label>
                            <Input 
                              id="username"
                              placeholder="请输入用户名"
                              {...bind(newUsername)}
                            />
                          </div>
                          
                          <div className="space-y-2">
                            <Label htmlFor="email">邮箱</Label>
                            <Input 
                              id="email"
                              type="email"
                              placeholder="请输入邮箱地址"
                              {...bind(newEmail)}
                            />
                          </div>
                          
                          <div className="space-y-2">
                            <Label htmlFor="role">角色</Label>
                            <Select 
                              value={newRole} 
                              onValueChange={(value) => { newRole.value = value; }}
                            >
                              <SelectTrigger>
                                <SelectValue placeholder="选择角色" />
                              </SelectTrigger>
                              <SelectContent>
                                <SelectItem value="admin">管理员</SelectItem>
                                <SelectItem value="editor">编辑</SelectItem>
                                <SelectItem value="user">用户</SelectItem>
                              </SelectContent>
                            </Select>
                          </div>
                        </div>
                        
                        <DialogFooter>
                          <Button variant="outline" onClick={() => { dialogOpen.value = false; }}>
                            取消
                          </Button>
                          <Button onClick={handleAddUser}>
                            确认添加
                          </Button>
                        </DialogFooter>
                      </DialogContent>
                    </Dialog>
                  </div>
                </div>
              </CardHeader>
              
              <CardContent>
                <Table>
                  <TableHeader>
                    <TableRow>
                      <TableHead>用户名</TableHead>
                      <TableHead>邮箱</TableHead>
                      <TableHead>角色</TableHead>
                      <TableHead>状态</TableHead>
                      <TableHead>注册时间</TableHead>
                      <TableHead className="w-16">操作</TableHead>
                    </TableRow>
                  </TableHeader>
                  <TableBody>
                    {filteredUsers.value.map(user => (
                      <UserRow key={user.id} user={user} />
                    ))}
                    {filteredUsers.value.length === 0 && (
                      <TableRow>
                        <TableCell colSpan={6} className="text-center py-8 text-muted-foreground">
                          {searchKeyword.value ? '未找到匹配的用户' : '暂无用户数据'}
                        </TableCell>
                      </TableRow>
                    )}
                  </TableBody>
                </Table>
              </CardContent>
            </Card>
          </div>
        </div>
      );
    });

    render(App, document.getElementById('app'));
  </script>
</body>
</html>
