name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Download Artifacts
        uses: ./.github/actions/download-artifacts

      - name: Clean workspace
        run: |
          git clean -fdx
          git reset --hard HEAD
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Run tests
        run: pnpm test
        shell: bash

  typecheck:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Download Artifacts
        uses: ./.github/actions/download-artifacts

      - name: Clean workspace
        run: |
          git clean -fdx
          git reset --hard HEAD
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build packages
        run: pnpm build
        shell: bash

      - name: Run type check
        run: pnpm -r typecheck
        shell: bash

  release:
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    # Required permissions for OIDC Trusted Publishing and provenance
    permissions:
      contents: write # to create release commits and tags
      pull-requests: write # to create pull request (changesets/action)
      id-token: write # to enable OIDC for npm provenance and trusted publishing
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Download Artifacts
        uses: ./.github/actions/download-artifacts

      - name: Clean workspace
        run: |
          git clean -fdx
          git reset --hard HEAD
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      # Upgrade npm to support Trusted Publishing (requires npm >= 11.5.1)
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN is optional when using Trusted Publishing (OIDC)
          # Keep it as fallback for environments without OIDC support
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get-tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.get-tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-tag.outputs.tag }}
          name: Release ${{ steps.get-tag.outputs.tag }}
          body: |
            ## Published Packages
            ${{ needs.release.outputs.publishedPackages }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
